apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-api
  template:
    metadata:
      labels:
        app: simple-api
    spec:
      containers:
        - name: simple-api
          image: chitsaz/simple-api:4dab192470c657e65b90976ce6cdd863bada1208
          ports:
            - containerPort: 8080