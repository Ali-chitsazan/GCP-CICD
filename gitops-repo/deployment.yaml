apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-api
  template:
    metadata:
      labels:
        app: simple-api
    spec:
      containers:
        - name: simple-api
          image: chitsaz/simple-api:1bfae2d5e98079bf291033744d4f70021206d9e3
          ports:
            - containerPort: 8080