name: CI Build and Update GitOps

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/simple-api:${{ github.sha }} ./app-repo

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/simple-api:${{ github.sha }}

      - name: Update deployment file
        run: |
          sed -i "s/REPLACE_TAG/${{ github.sha }}/" gitops/deployment.yaml

      - name: Commit and push GitOps change
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add gitops/deployment.yaml
          git commit -m "update image tag ${{ github.sha }}" || echo "no changes"
          git push
